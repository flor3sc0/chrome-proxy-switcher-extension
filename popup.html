<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки прокси</title>
</head>
<body>
    <h1>Настройки прокси</h1>
    <label for="proxyHost">Хост:</label>
    <input type="text" id="proxyHost" placeholder="Введите хост прокси"/>
    <label for="proxyPort">Порт:</label>
    <input type="text" id="proxyPort" placeholder="Введите порт прокси"/>
    <label for="allowedDomains">Разрешенные домены (через запятую):</label>
    <input type="text" id="allowedDomains" placeholder="example.com, *.example.org"/>
    <button id="setProxy">Установить прокси</button>
    <script src="popup.js"></script>
</body>
</html>
