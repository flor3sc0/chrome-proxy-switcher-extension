<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" type="text/css" href="popup.css">
</head>

<body>
    <h1>Proxy Settings</h1>
    <div>
        <label for="proxyHost">Proxy Host:</label>
        <input type="text" id="proxyHost">
    </div>
    <div>
        <label for="proxyPort">Proxy Port:</label>
        <input type="number" id="proxyPort">
    </div>
    <div>
        <label for="allowedDomains">Allowed Domains:</label>
        <textarea id="allowedDomains" placeholder="exapmle.org, example.com, ..."></textarea>
    </div>
    <button id="setProxy">Set Proxy</button>
    <button id="disableProxy">Disable Proxy</button>
    <div id="currentStatusContainer">
        <span id="currentStatus">State: INACTIVE</span>
        <span id="statusIcon"></span>
    </div>
    <script src="popup.js"></script>
</body>

</html>
